workflows:
  android-release:
    name: Build FocusFilter Release APK
    environment:
      java: 17
      android_signing:
        - focusfilter_keystore
    scripts:
      - name: Unpack project
        script: |
          tar -xf FocusFilter_V5_fixed.tar.gz
          ls -la
      - name: Generate gradlew
        script: |
          gradle wrapper
          chmod +x gradlew
      - name: Build Signed Release APK
        script: |
          ./gradlew assembleRelease --stacktrace --info
      - name: Verify APK
        script: |
          echo "=== APK Verification ==="
          ls -la app/build/outputs/apk/release/
          file app/build/outputs/apk/release/*.apk
    artifacts:
      - app/build/outputs/apk/release/*.apk
