workflows:
  android-release:
    name: Build FocusFilter Release APK
    environment:
      java: 17
      android_signing:
        - focusfilter_keystore
    scripts:
      - name: Unpack project
        script: |
          tar -xf FocusFilter_V5.tar.gz-5.tar
          ls -la
      - name: Generate gradlew
        script: |
          cd FocusFilter
          gradle wrapper
          chmod +x gradlew
      - name: Build Signed Release APK
        script: |
          cd FocusFilter
          ./gradlew assembleRelease --stacktrace --info
      - name: Verify APK
        script: |
          echo "=== APK Verification ==="
          ls -la FocusFilter/app/build/outputs/apk/release/
          file FocusFilter/app/build/outputs/apk/release/*.apk
    artifacts:
      - FocusFilter/app/build/outputs/apk/release/*.apk
      - FocusFilter/build_log.txt
